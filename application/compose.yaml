services:
  web:
    # This platform image digest is loaded from the Nix closure before Compose.
    image: docker.io/library/nginx@sha256:dc8e6d3967a06c0c9bb10d16cfc5770686de05da4c34d4224ef2aec61142e8f1
    pull_policy: never
    # The installer may place a root-only dotenv file here. It is deliberately
    # outside the Nix store and is optional for services that need no secrets.
    env_file:
      - path: /var/lib/mini-pc/secrets/compose.env
        required: false
    restart: unless-stopped
    ports:
      - "8080:80"
    read_only: true
    tmpfs:
      - /var/cache/nginx
      - /var/run
    security_opt:
      - no-new-privileges=true
    cap_drop:
      - ALL
    cap_add:
      - CHOWN
      - SETGID
      - SETUID
      - NET_BIND_SERVICE
    healthcheck:
      test: ["CMD", "wget", "-qO-", "http://127.0.0.1/"]
      interval: 10s
      timeout: 3s
      retries: 12
      start_period: 10s
