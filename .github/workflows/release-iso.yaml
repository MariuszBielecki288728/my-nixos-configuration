name: Release rescue ISO

on:
  push:
    tags: ["v*"]
  workflow_dispatch:

permissions:
  contents: write

jobs:
  release:
    runs-on: ubuntu-24.04
    timeout-minutes: 60
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0
      - uses: cachix/install-nix-action@a49548c11d9846ad46ecc0115273879b045f001c
      - name: Validate configured public key
        env:
          RESCUE_SSH_PUBLIC_KEY: ${{ vars.RESCUE_SSH_PUBLIC_KEY }}
        run: test -n "$RESCUE_SSH_PUBLIC_KEY" && grep -Eq '^ssh-(ed25519|rsa|ecdsa-[^ ]+) ' <<<"$RESCUE_SSH_PUBLIC_KEY"
      - name: Build key-authorized ISO
        env:
          RESCUE_SSH_PUBLIC_KEY: ${{ vars.RESCUE_SSH_PUBLIC_KEY }}
        run: |
          printf '%s\n' "$RESCUE_SSH_PUBLIC_KEY" > /tmp/rescue.pub
          scripts/build-iso.sh /tmp/rescue.pub
          cp result/iso/*.iso nixos-mini-pc-rescue.iso
          sha256sum nixos-mini-pc-rescue.iso > nixos-mini-pc-rescue.iso.sha256
      - uses: softprops/action-gh-release@3d0d9888cb7fd7b750713d6e236d1fcb99157228
        if: startsWith(github.ref, 'refs/tags/')
        with:
          draft: true
          files: |
            nixos-mini-pc-rescue.iso
            nixos-mini-pc-rescue.iso.sha256
