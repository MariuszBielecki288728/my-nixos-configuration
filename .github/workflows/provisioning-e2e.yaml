name: Provisioning E2E

on:
  workflow_dispatch:
  pull_request:
    paths:
      - flake.nix
      - flake.lock
      - hosts/**
      - modules/**
      - application/**
      - rescue/**
      - pxe/**
      - python/**
      - scripts/**
      - tests/e2e/**
      - tests/pxe/**

permissions:
  contents: read

concurrency:
  group: provisioning-e2e-${{ github.ref }}
  cancel-in-progress: true

jobs:
  e2e:
    runs-on: ubuntu-24.04
    timeout-minutes: 120
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0
      - uses: cachix/install-nix-action@a49548c11d9846ad46ecc0115273879b045f001c
      - name: Verify KVM
        run: test -r /dev/kvm -a -w /dev/kvm
      - name: Run disposable full install
        run: nix develop -c timeout 100m tests/e2e/run.sh
      - uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a
        if: always()
        with:
          name: provisioning-e2e-logs
          path: .e2e/logs
          if-no-files-found: ignore
          retention-days: 14
